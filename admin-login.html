<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Digital Court System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css">
    <style>
        /* Specific Login Styles reusing main.css variables */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #e0e7ff 0%, #f8fafc 40%);
        }
        
        /* Nav overlay for login page to keep branding */
        .login-nav {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: var(--spacing-4) var(--spacing-5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: var(--spacing-4);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .login-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .login-card {
            background: white;
            padding: var(--spacing-5);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--clr-border);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s ease;
        }

        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--clr-primary-500), var(--clr-primary-700));
        }

        .login-icon {
            width: 64px; height: 64px;
            background: #eff6ff; color: var(--clr-primary-600);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto var(--spacing-3); font-size: 1.5rem;
        }

        .login-title {
            color: var(--clr-primary-800);
            margin-bottom: var(--spacing-1);
        }
        
        .login-subtitle {
            color: var(--clr-text-muted);
            font-size: 0.9rem;
            margin-bottom: var(--spacing-4);
        }

        .form-group {
            text-align: left;
            margin-bottom: var(--spacing-3);
        }

        .form-group label {
            display: block; font-weight: 500; font-size: 0.85rem;
            margin-bottom: var(--spacing-1); color: var(--clr-text-main);
        }

        .form-control {
            width: 100%; padding: 0.75rem 1rem;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            font-family: inherit; font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--clr-primary-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .login-btn {
            width: 100%; margin-top: var(--spacing-2);
        }

        .error-message {
            color: #ef4444; font-size: 0.85rem; font-weight: 500;
            background: #fef2f2; border: 1px solid #fecaca;
            padding: 0.5rem; border-radius: var(--radius-sm);
            margin-bottom: var(--spacing-3);
            display: none; 
        }
        
        .error-message.show { display: block; }

        @media (max-width: 480px) {
            .login-card { padding: var(--spacing-4); }
        }
    </style>
</head>
<body>
    
    <div class="login-nav">
        <a href="./index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="brand-icon">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="nav-brand">Digital Court System</span>
        </a>
        <button id="lang-toggle" class="btn-lang" aria-label="Toggle Language">
            <span class="lang-en active">EN</span>
            <span class="lang-divider">|</span>
            <span class="lang-hi">HI</span>
        </button>
    </div>

    <div class="login-container fade-in">
        <div class="login-card">
            <div class="login-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            
            <h2 class="login-title" id="login-title">Admin Portal</h2>
            <p class="login-subtitle" id="login-subtitle">Secure access for authorized personnel only</p>
            
            <div class="error-message" id="error-message">Invalid credentials. Please try again.</div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username" id="label-username">Username or ID</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password" id="label-password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary login-btn" id="btn-login">Secure Login</button>
            </form>
            
            <div style="margin-top: 1.5rem;">
                <a href="./index.html" style="color: var(--clr-text-muted); font-size: 0.85rem; font-weight: 500; text-decoration: underline;" id="link-return">Return to Homepage</a>
            </div>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
